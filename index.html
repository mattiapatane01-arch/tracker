<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 16px;
      color: #3c3c3c;
      background: #f7f9fc;
      padding: 22px 14px;
      max-width: 600px;
      margin: 0 auto;
    }

    /* Header */
    .header { text-align: center; margin-bottom: 18px; }
    .header h1 { font-size: 26px; font-weight: 900; color: #1cb0f6; }
    .nav { display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 6px; }
    .date { font-size: 14px; font-weight: 700; color: #afafaf; }
    .btn-nav {
      width: 30px; height: 30px; border: 2px solid #e5e5e5; border-bottom-width: 4px;
      border-radius: 12px; background: #fff; color: #afafaf; font-size: 14px; font-weight: 800;
      cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .btn-nav:active:not(:disabled) { border-bottom-width: 2px; transform: translateY(2px); }
    .btn-nav:disabled { opacity: 0.35; cursor: default; }
    .past-label { color: #ff9600; margin-left: 6px; font-size: 13px; }

    .section { margin-bottom: 26px; }
    .section-title {
      font-size: 13px; font-weight: 800; letter-spacing: 0.06em; text-transform: uppercase;
      color: #afafaf; margin-bottom: 12px;
    }
    .checklist-progress { font-size: 14px; font-weight: 700; color: #afafaf; margin-bottom: 14px; text-align: right; }
    .checklist-progress span { color: #58cc02; }

    /* Card */
    .card {
      background: #fff; border: 2px solid #e5e5e5; border-bottom-width: 4px;
      border-radius: 18px; padding: 8px 16px;
    }

    /* Macro-aree */
    .cat-block { margin-bottom: 16px; }
    .cat-block:last-child { margin-bottom: 0; }
    .cat-title { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
    .cat-name {
      flex: 1; display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      font-size: 18px; font-weight: 800; color: #4b4b4b;
    }
    .cat-emoji { font-size: 22px; }
    .cat-medal { font-size: 18px; }
    .cat-streak { background: #fff0e6; color: #ff9600; font-weight: 800; font-size: 13px; padding: 3px 9px; border-radius: 20px; }
    .cat-count { background: #f0f0f0; color: #afafaf; font-weight: 800; font-size: 13px; padding: 3px 10px; border-radius: 20px; flex-shrink: 0; }
    .cat-block.cat-complete .card { border-color: #58cc02; background: #f7fff0; }
    .cat-block.cat-complete .cat-name { color: #58a700; }

    /* Riga task */
    .checklist-item {
      display: flex; align-items: center; gap: 13px; padding: 11px 2px;
      border-bottom: 2px solid #f0f0f0; cursor: pointer; user-select: none;
    }
    .checklist-item:last-of-type { border-bottom: none; }
    .checklist-item input[type="checkbox"] {
      appearance: none; -webkit-appearance: none;
      width: 26px; height: 26px; flex-shrink: 0; cursor: pointer; position: relative;
      border: 2px solid #e5e5e5; border-radius: 50%; background: #fff;
    }
    .checklist-item input[type="checkbox"]:checked { background: #58cc02; border-color: #58cc02; }
    .checklist-item input[type="checkbox"]:checked::after {
      content: ""; position: absolute; left: 8px; top: 6px; width: 8px; height: 12px;
      border-right: 3px solid #fff; border-bottom: 3px solid #fff; transform: rotate(45deg);
    }
    .checklist-item label { flex: 1; cursor: pointer; color: #4b4b4b; font-size: 16px; font-weight: 700; }
    .checklist-item.checked label { color: #afafaf; text-decoration: line-through; }

    /* Giorni passati */
    .checklist-item.past { pointer-events: none; }
    .checklist-item.past label { cursor: default; }
    .checklist-item.past-done label   { color: #58cc02; }
    .checklist-item.past-missed label { color: #ff4b4b; }
    .checklist-item.past input { opacity: 0.5; }

    /* Note */
    .note-btn { background: none; border: none; color: #cfcfcf; cursor: pointer; font-size: 15px; padding: 2px 4px; flex-shrink: 0; }
    .note-btn:hover { color: #888; }
    .note-preview { font-size: 13px; color: #afafaf; padding: 0 0 8px 39px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .note-area { display: none; padding: 4px 0 12px 39px; }
    .note-area.open { display: block; }
    .note-area textarea {
      width: 100%; background: #f7f9fc; border: 2px solid #e5e5e5; border-radius: 12px;
      color: #4b4b4b; font-size: 14px; font-family: inherit; font-weight: 600; line-height: 1.5;
      padding: 9px 12px; resize: none; height: 58px; outline: none;
    }
    .note-area textarea:focus { border-color: #1cb0f6; }
    .note-area textarea:disabled { opacity: 0.6; cursor: default; }

    /* Gradi */
    .rank-item { display: flex; align-items: center; gap: 13px; padding: 11px 2px; border-bottom: 2px solid #f0f0f0; }
    .rank-item:last-child { border-bottom: none; }
    .rank-medal {
      width: 40px; height: 40px; flex-shrink: 0; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; font-size: 20px;
      background: #f0f0f0;
    }
    .rank-body { flex: 1; }
    .rank-name { font-size: 14px; font-weight: 800; color: #4b4b4b; margin-bottom: 5px; }
    .bar { height: 14px; border-radius: 10px; background: #e5e5e5; overflow: hidden; }
    .fill { height: 100%; border-radius: 10px; background: #58cc02; transition: width 0.4s ease; }
    .rank-count { font-size: 13px; font-weight: 800; color: #afafaf; flex-shrink: 0; }

    /* Clock-in */
    .clockin {
      min-height: 82vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center; gap: 10px;
    }
    .clockin-date { font-size: 14px; font-weight: 700; color: #afafaf; }
    .clockin-day { font-size: 28px; font-weight: 900; color: #1cb0f6; }
    .btn-clockin {
      margin-top: 18px; padding: 16px 48px; cursor: pointer;
      font-family: inherit; font-size: 17px; font-weight: 800; letter-spacing: 0.04em; text-transform: uppercase;
      color: #fff; background: #58cc02; border: none; border-bottom: 5px solid #58a700; border-radius: 16px;
    }
    .btn-clockin:active { border-bottom-width: 2px; transform: translateY(3px); }
    .clockin-phrase { font-size: 15px; font-weight: 700; color: #afafaf; font-style: italic; margin-top: 20px; max-width: 280px; min-height: 42px; }

    /* Coriandoli (festeggiamento al completamento) */
    .confetti {
      position: fixed; pointer-events: none; z-index: 999; opacity: 1;
      transition: transform 0.8s ease-out, opacity 0.8s ease-out;
    }
    @keyframes pop { 0% { transform: scale(1); } 35% { transform: scale(1.04); } 100% { transform: scale(1); } }
    .cat-block.justdone .card { animation: pop 0.4s ease; }
  </style>
</head>
<body>

<div id="app">Caricamento...</div>

<script>
  // Ora locale (non UTC) — fix timezone Australia
  const TODAY = (() => {
    const d = new Date();
    return [d.getFullYear(), String(d.getMonth()+1).padStart(2,'0'), String(d.getDate()).padStart(2,'0')].join('-');
  })();
  let currentDay = TODAY;

  function dayKey(day) { return 'tracker_checklist_' + day; }

  // --- Clock-in: una chiave per giorno (nuovo giorno = ricompare, reset a mezzanotte gratis) ---
  function hasClockedIn(day) { return !!localStorage.getItem('tracker_clockin_' + day); }
  function setClockedIn(day) { localStorage.setItem('tracker_clockin_' + day, new Date().toISOString()); }

  const PHRASES = [
    'Un passo avanti a ieri.',
    'Conta solo presentarsi, anche oggi.',
    'Il processo, non il risultato.',
    'Piccolo e costante batte grande e raro.',
    'Nessuno lo farà al posto tuo.',
    'Costruisci, non aspettare.',
    'La disciplina di oggi è la libertà di domani.',
    'Non devi essere perfetto, devi esserci.'
  ];
  function randomPhrase() { return PHRASES[Math.floor(Math.random() * PHRASES.length)]; }

  function challengeDay(start) {
    const ms = Date.parse(TODAY + 'T00:00:00') - Date.parse(start + 'T00:00:00');
    return Math.floor(ms / 86400000) + 1;
  }

  function offsetDay(iso, n) {
    const [y, m, d] = iso.split('-').map(Number);
    const date = new Date(y, m - 1, d);
    date.setDate(date.getDate() + n);
    return [date.getFullYear(), String(date.getMonth()+1).padStart(2,'0'), String(date.getDate()).padStart(2,'0')].join('-');
  }

  function hasData(day) {
    const s = localStorage.getItem(dayKey(day));
    return !!(s && Object.keys(JSON.parse(s)).length > 0);
  }
  function findPrev(day) {
    let d = offsetDay(day, -1);
    for (let i = 0; i < 365; i++) { if (hasData(d)) return d; d = offsetDay(d, -1); }
    return null;
  }
  function findNext(day) {
    let d = offsetDay(day, 1);
    while (d <= TODAY) { if (d === TODAY || hasData(d)) return d; d = offsetDay(d, 1); }
    return null;
  }

  function getChecklistState(day) { return JSON.parse(localStorage.getItem(dayKey(day)) || '{}'); }
  function setChecklistState(day, state) { localStorage.setItem(dayKey(day), JSON.stringify(state)); }

  // Streak di un'area: giorni consecutivi in cui TUTTE le sue task sono fatte.
  function calcCategoryStreak(cat) {
    const allDone = d => cat.tasks.every(t => getChecklistState(d)[t.id]);
    let d = allDone(TODAY) ? TODAY : offsetDay(TODAY, -1);
    let streak = 0;
    for (let i = 0; i < 365; i++) { if (allDone(d)) { streak++; d = offsetDay(d, -1); } else break; }
    return streak;
  }

  // Giorni TOTALI completati di un'area (da challengeStart a oggi)
  function categoryDaysDone(cat, start) {
    let count = 0, d = TODAY;
    while (d >= start) { if (cat.tasks.every(t => getChecklistState(d)[t.id])) count++; d = offsetDay(d, -1); }
    return count;
  }

  // Gradi (per ora Bronzo 15 e Argento 50; Oro 100 e Diamante 200 più avanti)
  const RANKS = [
    { name: 'Bronzo',  min: 15, medal: '🥉' },
    { name: 'Argento', min: 50, medal: '🥈' }
  ];
  function rankInfo(days) {
    if (days >= 50) return { current: RANKS[1], next: null };
    if (days >= 15) return { current: RANKS[0], next: RANKS[1] };
    return { current: null, next: RANKS[0] };
  }

  function getNotes(day) { return JSON.parse(localStorage.getItem('tracker_notes_' + day) || '{}'); }
  function saveNote(day, id, text) {
    const notes = getNotes(day); notes[id] = text;
    localStorage.setItem('tracker_notes_' + day, JSON.stringify(notes));
  }

  function formatDate(iso) {
    return new Date(iso + 'T00:00:00').toLocaleDateString('it-IT', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
  }

  // Coriandoli quando completi un'area
  function celebrate(el) {
    const r = el.getBoundingClientRect();
    const cx = r.left + r.width / 2, cy = r.top + r.height / 2;
    const colors = ['#58cc02', '#1cb0f6', '#ffc800', '#ff4b4b', '#ce82ff', '#ff9600'];
    for (let i = 0; i < 42; i++) {
      const p = document.createElement('div'); p.className = 'confetti';
      const sz = 8 + Math.random() * 8; p.style.width = p.style.height = sz + 'px';
      p.style.left = cx + 'px'; p.style.top = cy + 'px';
      p.style.background = colors[i % colors.length];
      if (Math.random() < 0.5) p.style.borderRadius = '50%';
      document.body.appendChild(p);
      const ang = Math.random() * Math.PI * 2, dist = 90 + Math.random() * 170;
      requestAnimationFrame(() => {
        p.style.transform = `translate(${Math.cos(ang) * dist}px, ${Math.sin(ang) * dist - 50}px) rotate(${Math.random() * 540}deg)`;
        p.style.opacity = '0';
      });
      setTimeout(() => p.remove(), 800);
    }
  }

  // Prima vista: clock-in
  function renderClockIn(data) {
    const dayNum = challengeDay(data.meta.challengeStart);
    document.getElementById('app').innerHTML = `
      <div class="clockin">
        <div class="clockin-date">${formatDate(TODAY)}</div>
        <div class="clockin-day">Giorno ${dayNum}</div>
        <button class="btn-clockin" id="btn-clockin">Inizia</button>
        <div class="clockin-phrase">${randomPhrase()}</div>
      </div>
    `;
    document.getElementById('btn-clockin').addEventListener('click', () => {
      setClockedIn(TODAY);
      render(data, TODAY);
    });
  }

  function render(data, day) {
    const isToday    = day === TODAY;
    const prevDay    = findPrev(day);
    const nextDay    = isToday ? null : findNext(day);
    const checkState = getChecklistState(day);
    const notes      = getNotes(day);
    const allTasks   = data.dailyChecklist.flatMap(c => c.tasks);
    const total      = allTasks.length;
    const done       = allTasks.filter(t => checkState[t.id]).length;

    const dayLabel = isToday ? 'Oggi'
      : day === offsetDay(TODAY, -1) ? 'Ieri'
      : formatDate(day);

    document.getElementById('app').innerHTML = `

      <div class="header">
        <h1>Tracker</h1>
        <div class="nav">
          <button class="btn-nav" id="btn-prev" ${!prevDay ? 'disabled' : ''}>←</button>
          <div class="date">${formatDate(day)}</div>
          <button class="btn-nav" id="btn-next" ${!nextDay ? 'disabled' : ''}>→</button>
        </div>
      </div>

      <div class="section">
        <div class="section-title">${dayLabel}${!isToday ? '<span class="past-label">— sola lettura</span>' : ''}</div>
        <div class="checklist-progress"><span id="done-count">${done}</span> / ${total} completate</div>
        ${data.dailyChecklist.map(cat => {
          const catTotal = cat.tasks.length;
          const catDone  = cat.tasks.filter(t => checkState[t.id]).length;
          const complete = catDone === catTotal;
          const streak   = calcCategoryStreak(cat);
          const rank     = rankInfo(categoryDaysDone(cat, data.meta.challengeStart)).current;
          return `
          <div class="cat-block${complete ? ' cat-complete' : ''}" data-cat="${cat.id}">
            <div class="cat-title">
              <span class="cat-name">
                <span class="cat-emoji">${cat.icon}</span>${cat.label}
                ${rank ? `<span class="cat-medal">${rank.medal}</span>` : ''}
                ${isToday && streak >= 1 ? `<span class="cat-streak">🔥 ${streak}</span>` : ''}
              </span>
              <span class="cat-count">${catDone}/${catTotal}</span>
            </div>
            <div class="card">
              ${cat.tasks.map(t => {
                const isDone = !!checkState[t.id];
                const note   = notes[t.id] || '';
                const pastClass = !isToday ? (isDone ? ' past past-done' : ' past past-missed') : '';
                return `
                  <div class="checklist-wrapper">
                    <div class="checklist-item${isDone ? ' checked' : ''}${pastClass}" data-id="${t.id}">
                      <input type="checkbox" id="chk_${t.id}" ${isDone ? 'checked' : ''} ${!isToday ? 'disabled' : ''}>
                      <label for="chk_${t.id}">${t.label}</label>
                      <button class="note-btn" data-note-for="${t.id}" title="${isToday ? 'Aggiungi nota' : 'Leggi nota'}">${isToday ? '✏' : '👁'}</button>
                    </div>
                    ${note ? `<div class="note-preview" id="preview_${t.id}">${note}</div>` : `<div class="note-preview" id="preview_${t.id}" style="display:none"></div>`}
                    <div class="note-area" id="note_${t.id}">
                      <textarea ${!isToday ? 'disabled' : ''} placeholder="Aggiungi una nota...">${note}</textarea>
                    </div>
                  </div>
                `;
              }).join('')}
            </div>
          </div>
          `;
        }).join('')}
      </div>

      <div class="section">
        <div class="section-title">Gradi</div>
        <div class="card">
          ${data.dailyChecklist.map(cat => {
            const days = categoryDaysDone(cat, data.meta.challengeStart);
            const { current, next } = rankInfo(days);
            const threshold = next ? next.min : RANKS[1].min;
            const pct   = Math.min(100, Math.round((days / threshold) * 100));
            const medal = current ? current.medal : '🔒';
            const label = next ? `${cat.label} → ${next.name}` : `${cat.label} · ${current.name} max`;
            return `
              <div class="rank-item">
                <div class="rank-medal">${medal}</div>
                <div class="rank-body">
                  <div class="rank-name">${label}</div>
                  <div class="bar"><div class="fill" style="width:${pct}%"></div></div>
                </div>
                <div class="rank-count">${days}/${threshold}</div>
              </div>`;
          }).join('')}
        </div>
      </div>

    `;

    // Navigazione
    if (prevDay) document.getElementById('btn-prev').addEventListener('click', () => { currentDay = prevDay; render(data, currentDay); });
    if (nextDay) document.getElementById('btn-next').addEventListener('click', () => { currentDay = nextDay; render(data, currentDay); });

    // Checklist — solo oggi
    if (isToday) {
      document.querySelectorAll('.checklist-item').forEach(item => {
        item.addEventListener('click', function(e) {
          if (e.target.classList.contains('note-btn')) return;
          const id  = this.dataset.id;
          const chk = this.querySelector('input[type="checkbox"]');
          if (e.target !== chk) chk.checked = !chk.checked;

          const state = getChecklistState(day);
          const cat = data.dailyChecklist.find(c => c.tasks.some(t => t.id === id));
          const wasComplete = cat.tasks.every(t => state[t.id]);

          state[id] = chk.checked;
          setChecklistState(day, state);

          const nowComplete = cat.tasks.every(t => state[t.id]);
          render(data, day);

          if (!wasComplete && nowComplete) {
            const block = document.querySelector(`[data-cat="${cat.id}"]`);
            if (block) { block.classList.add('justdone'); celebrate(block); }
          }
        });
      });
    }

    // Note — tutti i giorni
    document.querySelectorAll('.note-btn').forEach(btn => {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        const id      = this.dataset.noteFor;
        const area    = document.getElementById('note_' + id);
        const preview = document.getElementById('preview_' + id);
        const isOpen  = area.classList.toggle('open');
        if (isOpen) {
          preview.style.display = 'none';
          if (isToday) area.querySelector('textarea').focus();
        } else {
          const text = area.querySelector('textarea').value.trim();
          if (text) { preview.textContent = text; preview.style.display = ''; }
        }
      });
    });

    // Auto-save note
    if (isToday) {
      document.querySelectorAll('.note-area textarea').forEach(ta => {
        const id = ta.closest('.note-area').id.replace('note_', '');
        ta.addEventListener('input', function() {
          saveNote(day, id, this.value);
          const preview = document.getElementById('preview_' + id);
          if (this.value.trim()) preview.textContent = this.value.trim();
        });
      });
    }
  }

  fetch('data.json?v=' + Date.now())
    .then(r => r.json())
    .then(data => {
      if (!hasClockedIn(TODAY)) renderClockIn(data);
      else render(data, currentDay);
    })
    .catch(err => {
      document.getElementById('app').textContent = 'Errore: ' + (err && err.message ? err.message : String(err));
    });
</script>

</body>
</html>
