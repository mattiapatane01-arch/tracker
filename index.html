<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #e8e8e8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 15px;
      line-height: 1.5;
      padding: 24px 16px;
      max-width: 640px;
      margin: 0 auto;
    }

    .header { margin-bottom: 32px; }
    .header h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #fff;
    }
    .header .date { color: #555; font-size: 13px; margin-top: 4px; }

    .section { margin-bottom: 32px; }
    .section-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #444;
      margin-bottom: 10px;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #262626;
      border-radius: 10px;
      padding: 4px 16px;
    }

    /* Checklist */
    .checklist-progress {
      font-size: 12px;
      color: #444;
      margin-bottom: 8px;
      text-align: right;
    }
    .checklist-progress span { color: #777; }

    .checklist-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 0;
      border-bottom: 1px solid #1f1f1f;
      cursor: pointer;
      user-select: none;
    }
    .checklist-item:last-child { border-bottom: none; }

    .checklist-item input[type="checkbox"] {
      width: 17px;
      height: 17px;
      accent-color: #4ade80;
      cursor: pointer;
      flex-shrink: 0;
    }
    .checklist-item label {
      cursor: pointer;
      flex: 1;
      color: #bbb;
      font-size: 14px;
    }
    .checklist-item.checked label {
      color: #3a3a3a;
      text-decoration: line-through;
    }

    .required-badge {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: #f97316;
      border: 1px solid #7c2d12;
      border-radius: 4px;
      padding: 2px 6px;
      flex-shrink: 0;
    }

    /* Contatori */
    .counters-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .counter-card {
      background: #1a1a1a;
      border: 1px solid #262626;
      border-radius: 10px;
      padding: 16px;
      text-align: center;
    }
    .counter-label {
      font-size: 11px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }
    .counter-value {
      font-size: 40px;
      font-weight: 700;
      color: #fff;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .counter-unit {
      font-size: 11px;
      color: #383838;
      margin-top: 2px;
    }
    .counter-controls {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 12px;
    }
    .btn-counter {
      width: 34px;
      height: 34px;
      border: 1px solid #2e2e2e;
      border-radius: 7px;
      background: #222;
      color: #888;
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.1s, color 0.1s;
    }
    .btn-counter:hover { background: #2a2a2a; color: #ccc; }
    .btn-counter:active { background: #333; }

    /* Milestone — stili base (layout gestito da .milestone-top nella nuova struttura) */
    .milestone-id {
      font-size: 11px;
      font-weight: 700;
      color: #444;
      min-width: 26px;
      padding-top: 3px;
      letter-spacing: 0.04em;
      flex-shrink: 0;
    }
    .milestone-body { flex: 1; }
    .milestone-name {
      font-size: 13px;
      font-weight: 600;
      color: #ccc;
      margin-bottom: 2px;
    }
    .milestone-desc {
      font-size: 11px;
      color: #404040;
      margin-bottom: 3px;
    }
    .milestone-deadline { font-size: 10px; color: #2e2e2e; }

    .status-badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 4px;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .status-locked      { color: #3a3a3a; border: 1px solid #2a2a2a; }
    .status-in-progress { color: #facc15; border: 1px solid #713f12; }
    .status-done        { color: #4ade80; border: 1px solid #166534; }

    /* Navigazione giorni */
    .nav {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 8px;
    }
    .btn-nav {
      background: none;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      color: #555;
      width: 28px;
      height: 28px;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .btn-nav:hover:not(:disabled) { border-color: #444; color: #aaa; }
    .btn-nav:disabled { opacity: 0.2; cursor: default; }
    .past-label {
      font-size: 11px;
      color: #3a3a3a;
      margin-left: 4px;
    }
    .checklist-item.past { pointer-events: none; }
    .checklist-item.past label { cursor: default; }

    /* Colori giorni passati */
    .checklist-item.past-done label   { color: #4ade80; }
    .checklist-item.past-missed label { color: #f87171; }
    .checklist-item.past-done input,
    .checklist-item.past-missed input { opacity: 0.4; }

    /* Note */
    .note-btn {
      background: none;
      border: none;
      color: #2e2e2e;
      cursor: pointer;
      font-size: 13px;
      padding: 2px 4px;
      flex-shrink: 0;
      line-height: 1;
      transition: color 0.1s;
    }
    .note-btn:hover { color: #666; }
    .note-preview {
      font-size: 11px;
      color: #3a3a3a;
      padding: 0 0 6px 29px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .note-area {
      display: none;
      padding: 4px 0 10px 29px;
    }
    .note-area.open { display: block; }
    .note-area textarea {
      width: 100%;
      background: #111;
      border: 1px solid #242424;
      border-radius: 6px;
      color: #777;
      font-size: 12px;
      font-family: inherit;
      line-height: 1.5;
      padding: 8px 10px;
      resize: none;
      height: 56px;
      outline: none;
    }
    .note-area textarea:focus { border-color: #333; color: #aaa; }
    .note-area textarea:disabled { opacity: 0.5; cursor: default; }

    /* Streak fuoco */
    .fire-streak {
      font-size: 11px;
      color: #f97316;
      margin-top: 5px;
      letter-spacing: 0.02em;
    }

    /* Milestone a due colonne */
    .milestones-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .milestone-col-title {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #333;
      margin-bottom: 8px;
    }

    /* Barre progresso XP */
    .milestone-item {
      padding: 12px 0;
      border-bottom: 1px solid #1f1f1f;
    }
    .milestone-item:last-child { border-bottom: none; }
    .milestone-top {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 6px;
    }
    .milestone-progress { margin-top: 6px; }
    .mp-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }
    .mp-label {
      font-size: 10px;
      color: #444;
      min-width: 80px;
      flex-shrink: 0;
    }
    .mp-bar-wrap {
      flex: 1;
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 3px;
      height: 6px;
      overflow: hidden;
    }
    .mp-bar-fill {
      height: 100%;
      border-radius: 3px;
      background: linear-gradient(90deg, #15803d, #4ade80);
      box-shadow: 0 0 5px rgba(74,222,128,0.25);
      transition: width 0.4s ease;
    }
    .mp-pct {
      font-size: 10px;
      color: #333;
      min-width: 28px;
      text-align: right;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

<div id="app">Caricamento...</div>

<script>
  // Ora locale (non UTC) — fix timezone Australia
  const TODAY = (() => {
    const d = new Date();
    return [d.getFullYear(), String(d.getMonth()+1).padStart(2,'0'), String(d.getDate()).padStart(2,'0')].join('-');
  })();
  const COUNTERS_KEY = 'tracker_counters';
  let currentDay = TODAY;

  function dayKey(day) { return 'tracker_checklist_' + day; }

  // Sposta di n giorni senza passare da UTC
  function offsetDay(iso, n) {
    const [y, m, d] = iso.split('-').map(Number);
    const date = new Date(y, m - 1, d);
    date.setDate(date.getDate() + n);
    return [date.getFullYear(), String(date.getMonth()+1).padStart(2,'0'), String(date.getDate()).padStart(2,'0')].join('-');
  }

  function hasData(day) {
    const s = localStorage.getItem(dayKey(day));
    return !!(s && Object.keys(JSON.parse(s)).length > 0);
  }

  // Giorno precedente con dati (salta i vuoti)
  function findPrev(day) {
    let d = offsetDay(day, -1);
    for (let i = 0; i < 365; i++) {
      if (hasData(d)) return d;
      d = offsetDay(d, -1);
    }
    return null;
  }

  // Giorno successivo con dati, o TODAY se è il più vicino
  function findNext(day) {
    let d = offsetDay(day, 1);
    while (d <= TODAY) {
      if (d === TODAY || hasData(d)) return d;
      d = offsetDay(d, 1);
    }
    return null;
  }

  function getChecklistState(day) {
    return JSON.parse(localStorage.getItem(dayKey(day)) || '{}');
  }
  function setChecklistState(day, state) {
    localStorage.setItem(dayKey(day), JSON.stringify(state));
  }

  const AUTO_INC = {
    'gruppo_samudeen': 'streakGruppo',
    'backtest_5':      'backtest',
    'video_challenge': 'streakVideo',
    'video_giorno':    'videoPubblicati'
  };

  function getAutoInc() {
    return JSON.parse(localStorage.getItem('tracker_autoinc_' + TODAY) || '{}');
  }
  function setAutoInc(id, val) {
    const ai = getAutoInc();
    if (val) ai[id] = true; else delete ai[id];
    localStorage.setItem('tracker_autoinc_' + TODAY, JSON.stringify(ai));
  }

  // Conta i giorni consecutivi con una checkbox spuntata (compreso oggi)
  function calcCheckboxStreak(checkboxId) {
    let streak = 0;
    let d = TODAY;
    for (let i = 0; i < 365; i++) {
      if (getChecklistState(d)[checkboxId]) { streak++; d = offsetDay(d, -1); }
      else break;
    }
    return streak;
  }

  function getNotes(day) {
    return JSON.parse(localStorage.getItem('tracker_notes_' + day) || '{}');
  }
  function saveNote(day, id, text) {
    const notes = getNotes(day);
    notes[id] = text;
    localStorage.setItem('tracker_notes_' + day, JSON.stringify(notes));
  }
  function getCounters(defaults) {
    const stored = localStorage.getItem(COUNTERS_KEY);
    if (stored) return JSON.parse(stored);
    const initial = {};
    defaults.forEach(c => { initial[c.id] = c.value; });
    localStorage.setItem(COUNTERS_KEY, JSON.stringify(initial));
    return initial;
  }
  function setCounters(vals) {
    localStorage.setItem(COUNTERS_KEY, JSON.stringify(vals));
  }

  function formatDate(iso) {
    return new Date(iso + 'T00:00:00').toLocaleDateString('it-IT', {
      weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
    });
  }
  function formatDeadline(iso) {
    return new Date(iso + 'T00:00:00').toLocaleDateString('it-IT', {
      day: 'numeric', month: 'long', year: 'numeric'
    });
  }

  const STATUS_LABEL = {
    'locked':      'Bloccata',
    'in-progress': 'In corso',
    'done':        'Completata'
  };

  function render(data, day) {
    const isToday     = day === TODAY;
    const prevDay     = findPrev(day);
    const nextDay     = isToday ? null : findNext(day);
    const checkState  = getChecklistState(day);
    const notes       = getNotes(day);
    const counterVals = getCounters(data.counters);
    const total       = data.dailyChecklist.length;
    const done        = data.dailyChecklist.filter(t => checkState[t.id]).length;

    const dayLabel = isToday ? 'Oggi'
      : day === offsetDay(TODAY, -1) ? 'Ieri'
      : formatDate(day);

    document.getElementById('app').innerHTML = `

      <div class="header">
        <h1>Tracker</h1>
        <div class="nav">
          <button class="btn-nav" id="btn-prev" ${!prevDay ? 'disabled' : ''}>←</button>
          <div class="date">${formatDate(day)}</div>
          <button class="btn-nav" id="btn-next" ${!nextDay ? 'disabled' : ''}>→</button>
        </div>
      </div>

      <div class="section">
        <div class="section-title">
          ${dayLabel}${!isToday ? '<span class="past-label">— sola lettura</span>' : ''}
        </div>
        <div class="checklist-progress"><span id="done-count">${done}</span> / ${total} completate</div>
        <div class="card">
          ${data.dailyChecklist.map(t => {
            const isDone = !!checkState[t.id];
            const note   = notes[t.id] || '';
            const pastClass = !isToday
              ? (isDone ? ' past past-done' : ' past past-missed')
              : '';
            return `
              <div class="checklist-wrapper">
                <div class="checklist-item${isDone ? ' checked' : ''}${pastClass}" data-id="${t.id}">
                  <input type="checkbox" id="chk_${t.id}" ${isDone ? 'checked' : ''} ${!isToday ? 'disabled' : ''}>
                  <label for="chk_${t.id}">${t.label}</label>
                  ${t.required ? '<span class="required-badge">Non negoziabile</span>' : ''}
                  <button class="note-btn" data-note-for="${t.id}" title="${isToday ? 'Aggiungi nota' : 'Leggi nota'}">${isToday ? '✏' : '👁'}</button>
                </div>
                ${note ? `<div class="note-preview" id="preview_${t.id}">${note}</div>` : `<div class="note-preview" id="preview_${t.id}" style="display:none"></div>`}
                <div class="note-area" id="note_${t.id}">
                  <textarea ${!isToday ? 'disabled' : ''} placeholder="Aggiungi una nota...">${note}</textarea>
                </div>
              </div>
            `;
          }).join('')}
        </div>
      </div>

      <div class="section">
        <div class="section-title">Contatori</div>
        <div class="counters-grid">
          ${(() => {
            const streakGruppo = calcCheckboxStreak('gruppo_samudeen');
            const streakVideo  = calcCheckboxStreak('video_challenge');
            const fireMap = { streakGruppo: streakGruppo, streakVideo: streakVideo };
            return data.counters.map(c => {
              const fire = fireMap[c.id];
              return `
              <div class="counter-card">
                <div class="counter-label">${c.label}</div>
                <div class="counter-value" id="val_${c.id}">${counterVals[c.id]}</div>
                <div class="counter-unit">${c.unit}</div>
                ${fire >= 2 ? `<div class="fire-streak">🔥 ${fire} di fila</div>` : ''}
                ${isToday ? `
                <div class="counter-controls">
                  <button class="btn-counter" data-counter="${c.id}" data-delta="-1">−</button>
                  <button class="btn-counter" data-counter="${c.id}" data-delta="1">+</button>
                </div>` : ''}
              </div>
            `}).join('');
          })()}
        </div>
      </div>

      <div class="section">
        <div class="section-title">Milestone</div>
        <div class="milestones-grid">
          ${['trading','social'].map(group => `
            <div>
              <div class="milestone-col-title">${group === 'trading' ? '📈 Trading' : '🎬 Social'}</div>
              <div class="card">
                ${data.milestones[group].map(m => {
                  const targets = m.targets ? Object.entries(m.targets) : [];
                  const barsHtml = targets.map(([id, target]) => {
                    const label   = data.counters.find(c => c.id === id)?.label || id;
                    const current = counterVals[id] || 0;
                    const pct     = Math.min(100, Math.round((current / target) * 100));
                    return `
                      <div class="mp-row">
                        <div class="mp-label">${current}/${target}</div>
                        <div class="mp-bar-wrap">
                          <div class="mp-bar-fill" style="width:${pct}%"></div>
                        </div>
                        <div class="mp-pct">${pct}%</div>
                      </div>`;
                  }).join('');
                  return `
                    <div class="milestone-item">
                      <div class="milestone-top">
                        <div class="milestone-id">${m.id}</div>
                        <div class="milestone-body">
                          <div class="milestone-name">${m.name}</div>
                          <div class="milestone-desc">${m.description}</div>
                          <div class="milestone-deadline">Entro ${formatDeadline(m.deadline)}</div>
                        </div>
                        <span class="status-badge status-${m.status}">${STATUS_LABEL[m.status]}</span>
                      </div>
                      ${barsHtml ? `<div class="milestone-progress">${barsHtml}</div>` : ''}
                    </div>`;
                }).join('')}
              </div>
            </div>
          `).join('')}
        </div>
      </div>

    `;

    // Navigazione
    if (prevDay) {
      document.getElementById('btn-prev').addEventListener('click', () => {
        currentDay = prevDay;
        render(data, currentDay);
      });
    }
    if (nextDay) {
      document.getElementById('btn-next').addEventListener('click', () => {
        currentDay = nextDay;
        render(data, currentDay);
      });
    }

    // Checklist events — solo oggi
    if (isToday) {
      document.querySelectorAll('.checklist-item').forEach(item => {
        item.addEventListener('click', function(e) {
          if (e.target.classList.contains('note-btn')) return;
          const id  = this.dataset.id;
          const chk = this.querySelector('input[type="checkbox"]');
          if (e.target !== chk) chk.checked = !chk.checked;

          const state = getChecklistState(day);
          state[id]   = chk.checked;
          setChecklistState(day, state);
          this.classList.toggle('checked', chk.checked);

          // Auto-increment contatori collegati (una sola volta per giorno)
          if (AUTO_INC[id]) {
            const counterId = AUTO_INC[id];
            const ai        = getAutoInc();
            const vals      = getCounters(data.counters);
            if (chk.checked && !ai[id]) {
              vals[counterId] = (vals[counterId] || 0) + 1;
              setCounters(vals);
              setAutoInc(id, true);
              document.getElementById('val_' + counterId).textContent = vals[counterId];
            } else if (!chk.checked && ai[id]) {
              vals[counterId] = Math.max(0, (vals[counterId] || 0) - 1);
              setCounters(vals);
              setAutoInc(id, false);
              document.getElementById('val_' + counterId).textContent = vals[counterId];
            }
          }

          const newDone = Object.values(state).filter(Boolean).length;
          document.getElementById('done-count').textContent = newDone;
        });
      });
    }

    // Note events — tutti i giorni (lettura passato, scrittura oggi)
    document.querySelectorAll('.note-btn').forEach(btn => {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        const id       = this.dataset.noteFor;
        const area     = document.getElementById('note_' + id);
        const preview  = document.getElementById('preview_' + id);
        const isOpen   = area.classList.toggle('open');
        if (isOpen) {
          preview.style.display = 'none';
          if (isToday) area.querySelector('textarea').focus();
        } else {
          const text = area.querySelector('textarea').value.trim();
          if (text) { preview.textContent = text; preview.style.display = ''; }
        }
      });
    });

    // Auto-save note mentre scrivi
    if (isToday) {
      document.querySelectorAll('.note-area textarea').forEach(ta => {
        const id = ta.closest('.note-area').id.replace('note_', '');
        ta.addEventListener('input', function() {
          saveNote(day, id, this.value);
          const preview = document.getElementById('preview_' + id);
          if (this.value.trim()) { preview.textContent = this.value.trim(); }
        });
      });
    }

    // Counter events — solo oggi
    document.querySelectorAll('[data-counter]').forEach(btn => {
      btn.addEventListener('click', function() {
        const id   = this.dataset.counter;
        const vals = getCounters(data.counters);
        vals[id]   = Math.max(0, (vals[id] || 0) + parseInt(this.dataset.delta));
        setCounters(vals);
        document.getElementById('val_' + id).textContent = vals[id];
      });
    });
  }

  fetch('data.json?v=' + Date.now())
    .then(r => r.json())
    .then(data => {
      // compatibilità col vecchio formato (milestones era un array)
      if (Array.isArray(data.milestones)) {
        data.milestones = { trading: data.milestones, social: [] };
      }
      render(data, currentDay);
    })
    .catch(err => {
      document.getElementById('app').textContent = 'Errore: ' + (err && err.message ? err.message : String(err));
    });
</script>

</body>
</html>
